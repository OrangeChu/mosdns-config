################ DNS Plugins #################
plugins:
  - tag: google
    type: forward
    args:
      concurrent: 2
      upstreams:
        - addr: "https://8.8.8.8/dns-query"
          dial_addr: "8.8.8.8"
          enable_pipeline: true # TCP/DoT 启用 RFC 7766 新的 query pipelining 连接复用模式
        - addr: "https://8.8.8.8/dns-query"
          dial_addr: "8.8.4.4"
          enable_pipeline: true

  - tag: cloudflare
    type: forward
    args:
      concurrent: 2
      upstreams:
        - addr: "https://1.1.1.1/dns-query"
          dial_addr: "1.1.1.1"
          enable_pipeline: true
        - addr: "https://1.1.1.1/dns-query"
          dial_addr: "1.0.0.1"
          enable_pipeline: true

  - tag: ali
    type: forward
    args:
      concurrent: 3
      upstreams:
        - addr: 119.29.29.29
        - addr: tls://223.6.6.6:853
        - addr: https://223.5.5.5/dns-query
        - addr: 114.114.114.114

  # dnspod doh dot
  - tag: dnspod
    type: forward
    args:
      concurrent: 2
      upstreams:
        - addr: "tls://dot.pub"
          dial_addr: "120.53.53.53"
          enable_pipeline: true
        - addr: "tls://dot.pub"
          dial_addr: "1.12.12.12"
          enable_pipeline: true

  # local dns
  # - tag: local
  #   type: forward
  #   args:
  #     concurrent: 1
  #     upstreams:
  #       - addr: "udp://192.168.1.1:53"

  # server 失败
  - tag: reject_2
    type: sequence
    args:
      - exec: reject 2

  # 拒绝响应
  - tag: reject_3
    type: sequence
    args:
      - exec: reject 3

  # 不支持的操作
  - tag: reject_5
    type: sequence
    args:
      - exec: reject 5